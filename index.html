<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keuangan Bersama App</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f0f1a; color: #fff; min-height: 100vh; padding-bottom: 60px; }

  :root {
    --purple: #7c3aed; --purple-l: #a78bfa; --purple-bg: #1e1035;
    --green: #059669; --green-l: #34d399; --green-bg: #0a2e1e;
    --red: #dc2626; --red-l: #f87171; --red-bg: #2d0f0f;
    --amber: #d97706; --amber-l: #fbbf24; --amber-bg: #2d1a04;
    --blue: #2563eb; --blue-l: #60a5fa; --blue-bg: #0c1a3a;
    --gray: #1e1e2f; --gray-l: #2d2d44;
  }

  .container { max-width: 480px; margin: 0 auto; padding: 16px; }
  
  /* Utilities & Cards */
  .card { background: var(--gray); border: 1px solid var(--gray-l); border-radius: 16px; padding: 16px; margin-bottom: 16px; }
  .flex-between { display: flex; justify-content: space-between; align-items: center; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .text-muted { color: #a0a0b0; font-size: 13px; }
  .btn { background: var(--purple); color: #fff; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s; }
  .btn:hover { background: #6d28d9; }
  .badge { padding: 4px 8px; border-radius: 8px; font-size: 11px; font-weight: bold; }
  
  /* Tabs & Header */
  .header-app { margin-bottom: 20px; }
  .workspace-code { background: var(--gray-l); padding: 6px 12px; border-radius: 20px; font-size: 12px; display: inline-flex; align-items: center; gap: 6px; cursor: pointer; }

  /* Monitoring Periodik Styles */
  .monitor-box { text-align: center; background: #151525; padding: 10px; border-radius: 12px; border: 1px solid #252538; }
  .monitor-progress-bar { width: 100%; height: 6px; background: #2d2d44; border-radius: 3px; margin: 8px 0 4px 0; overflow: hidden; }
  .monitor-fill { height: 100%; background: var(--purple); width: 0%; transition: width 0.3s; }
  .monitor-fill.warning { background: var(--amber); }
  .monitor-fill.danger { background: var(--red); }

  /* Minimalist SVG Chart Styles */
  .chart-container { display: flex; align-items: center; gap: 20px; justify-content: center; padding: 8px 0; }
  .chart-svg { transform: rotate(-90deg); width: 100px; height: 100px; }
  .chart-legends { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .legend-color { width: 12px; height: 12px; border-radius: 3px; shrink: 0; }

  /* Transaction Items */
  .tx-list { display: flex; flex-direction: column; gap: 12px; margin-top: 12px; }
  .tx-item { background: #151525; padding: 12px; border-radius: 12px; border-left: 4px solid #fff; display: flex; justify-content: space-between; align-items: center; }
  .tx-info { display: flex; gap: 12px; align-items: center; }
  .tx-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: #252538; font-size: 18px; }
  
  /* Bottom Nav Bar */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #131322; border-top: 1px solid var(--gray-l); display: flex; justify-content: space-around; padding: 8px 0; z-index: 99; }
  .nav-item { background: none; border: none; color: #a0a0b0; display: flex; flex-direction: column; align-items: center; font-size: 11px; gap: 4px; cursor: pointer; width: 60px; }
  .nav-item.active { color: var(--purple-l); }
  .nav-item i { font-size: 20px; }

  /* Modal Settings & Floating Button */
  .fab { position: fixed; bottom: 80px; right: 20px; width: 56px; height: 56px; background: var(--purple); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #fff; border: none; box-shadow: 0 4px 12px rgba(124,58,237,0.4); cursor: pointer; z-index: 98; }
  .modal-backdrop { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: flex; align-items: flex-end; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: 0.2s; }
  .modal-backdrop.open { opacity: 1; pointer-events: auto; }
  .modal-content { background: var(--gray); border-top-left-radius: 24px; border-top-right-radius: 24px; width: 100%; max-width: 480px; padding: 24px; box-sizing: border-box; transform: translateY(100%); transition: 0.3s; max-height: 85vh; overflow-y: auto; }
  .modal-backdrop.open .modal-content { transform: translateY(0); }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; color: #a0a0b0; margin-bottom: 6px; }
  .form-control { width: 100%; background: #151525; border: 1px solid var(--gray-l); border-radius: 12px; padding: 12px; color: #fff; font-size: 15px; outline: none; }
  .form-control:focus { border-color: var(--purple-l); }
  
  /* Authentication Style */
  .auth-screen { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 24px; }
  .auth-tabs { display: flex; background: #151525; border-radius: 12px; padding: 4px; margin-bottom: 20px; }
  .auth-tab { flex: 1; text-align: center; padding: 10px; border-radius: 8px; border: none; background: none; color: #a0a0b0; font-weight: bold; cursor: pointer; }
  .auth-tab.active { background: var(--purple); color: #fff; }
</style>
</head>
<body>

<div id="app"></div>

<script>
// Mocking State / Local Storage sederhana
const state = {
  screen: 'auth', // auth | main
  authTab: 'login', // login | register
  tab: 'beranda', // beranda | riwayat | target | profile
  modal: false,
  user: null,
  workspace: { name: 'Keluarga Utama', code: 'KB-883920' },
  // Default Alokasi Limit: Rp 100.000 / Hari
  budgetLimits: {
    daily: 100000,
    weekly: 700000,
    monthly: 3000000
  },
  transactions: [
    { id: 1, type: 'expense', category: 'Makanan', name: 'Makan Siang Padang', amount: 35000, date: '2026-05-20', user: 'Azman' },
    { id: 2, type: 'expense', category: 'Transport', name: 'Bensin Motor', amount: 20000, date: '2026-05-20', user: 'Azman' },
    { id: 3, type: 'income', category: 'Gaji', name: 'Sampingan WebGIS', amount: 1500000, date: '2026-05-18', user: 'Azman' },
    { id: 4, type: 'expense', category: 'Belanja', name: 'Token Listrik bulanan', amount: 200000, date: '2026-05-10', user: 'Shely' }
  ],
  categories: {
    expense: [
      { name: 'Makanan', color: 'var(--amber)', icon: 'ti-tools-kitchen-2' },
      { name: 'Transport', color: 'var(--blue)', icon: 'ti-car' },
      { name: 'Belanja', color: 'var(--pink)', icon: 'ti-shopping-bag' },
      { name: 'Lainnya', color: '#6b7280', icon: 'ti-category' }
    ],
    income: [
      { name: 'Gaji', color: 'var(--green)', icon: 'ti-cash' },
      { name: 'Bonus', color: 'var(--purple-l)', icon: 'ti-gift' }
    ]
  },
  newTx: { type: 'expense', category: 'Makanan', name: '', amount: '', date: new Date().toISOString().split('T')[0] }
};

function formatRupiah(num) {
  return 'Rp ' + Number(num).toLocaleString('id-ID');
}

// Menghitung akumulasi pengeluaran berdasarkan waktu saat ini (2026-05-20)
function getPeriodSpending() {
  const todayStr = '2026-05-20'; // Base date app sesuai context
  const today = new Date(todayStr);
  
  let daily = 0;
  let weekly = 0;
  let monthly = 0;

  state.transactions.forEach(tx => {
    if (tx.type !== 'expense') return;
    const txDate = new Date(tx.date);
    const diffTime = Math.abs(today - txDate);
    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

    // Harian (tanggal sama)
    if (tx.date === todayStr) daily += tx.amount;
    // Mingguan (dalam rentang 7 hari terakhir)
    if (diffDays <= 7) weekly += tx.amount;
    // Bulanan (bulan dan tahun yang sama)
    if (txDate.getMonth() === today.getMonth() && txDate.getFullYear() === today.getFullYear()) monthly += tx.amount;
  });

  return { daily, weekly, monthly };
}

function handleAuth(e) {
  e.preventDefault();
  state.user = { name: 'Azman Sidi Habibie' };
  state.screen = 'main';
  render();
}

function handleAddTx(e) {
  e.preventDefault();
  if(!state.newTx.name || !state.newTx.amount) return alert('Mohon isi semua data!');
  
  state.transactions.unshift({
    id: Date.now(),
    type: state.newTx.type,
    category: state.newTx.category,
    name: state.newTx.name,
    amount: Number(state.newTx.amount),
    date: state.newTx.date,
    user: 'Azman'
  });

  // Reset form
  state.newTx.name = '';
  state.newTx.amount = '';
  state.modal = false;
  render();
}

function render() {
  const app = document.getElementById('app');
  
  // 1. SCREEN AUTHENTICATION
  if(state.screen === 'auth') {
    app.innerHTML = `
      <div class="auth-screen container">
        <div style="text-align:center; margin-bottom: 30px;">
          <h2 style="color: var(--purple-l);"><i class="ti ti-wallet" style="font-size: 32px; vertical-align: middle;"></i> Keuangan Bersama</h2>
          <p class="text-muted" style="margin-top: 8px;">Kelola budgeting transparan bersama pasangan & keluarga</p>
        </div>
        <div class="auth-tabs">
          <button class="auth-tab ${state.authTab==='login'?'active':''}" onclick="state.authTab='login'; render();">Masuk</button>
          <button class="auth-tab ${state.authTab==='register'?'active':''}" onclick="state.authTab='register'; render();">Gabung</button>
        </div>
        <form onsubmit="handleAuth(event)">
          <div class="form-group">
            <label>${state.authTab==='login'?'Kode Workspace Kelompok':'Nama Workspace Baru'}</label>
            <input type="text" class="form-control" placeholder="${state.authTab==='login'?'Contoh: KB-883920':'Misal: Keluarga Jember'}" required />
          </div>
          <div class="form-group">
            <label>Nama Anda</label>
            <input type="text" class="form-control" placeholder="Nama Panggilan" required />
          </div>
          <button type="submit" class="btn" style="margin-top: 10px;">${state.authTab==='login'?'Masuk ke Workspace':'Buat Ruang Baru'}</button>
        </form>
      </div>
    `;
    return;
  }

  // 2. MAIN HUB DATA CALCULATION
  const totalIncome = state.transactions.filter(t=>t.type==='income').reduce((acc,c)=>acc+c.amount, 0);
  const totalExpense = state.transactions.filter(t=>t.type==='expense').reduce((acc,c)=>acc+c.amount, 0);
  const balance = totalIncome - totalExpense;

  // Penghitungan untuk Chart Donut Murni (SVG)
  const categoryTotals = {};
  let totalExpenseForChart = 0;
  state.transactions.filter(t=>t.type==='expense').forEach(t => {
    categoryTotals[t.category] = (categoryTotals[t.category] || 0) + t.amount;
    totalExpenseForChart += t.amount;
  });

  // Ambil Data Monitoring Pengeluaran Berkala
  const currentSpend = getPeriodSpending();

  let appHtml = `
    <div class="container">
      <div class="header-app flex-between">
        <div>
          <span class="text-muted">Workspace Aktif</span>
          <h3 style="font-weight: bold; color: #fff;">${state.workspace.name}</h3>
        </div>
        <div class="workspace-code" onclick="navigator.clipboard.writeText('${state.workspace.code}'); alert('Kode tersalin!');">
          <i class="ti ti-copy"></i> <span>${state.workspace.code}</span>
        </div>
      </div>
  `;

  // ── TAB BERANDA ──
  if(state.tab === 'beranda') {
    appHtml += `
      <div class="card" style="background: linear-gradient(135deg, #1e1035 0%, #0f0f1a 100%); border-color: var(--purple);">
        <span class="text-muted">Total Saldo Bersama</span>
        <h1 style="margin: 6px 0 16px 0; color: #fff; font-size: 32px;">${formatRupiah(balance)}</h1>
        <div class="grid-3" style="grid-template-columns: 1fr 1fr; gap:16px;">
          <div>
            <span class="text-muted" style="font-size:11px;"><i class="ti ti-arrow-up-right" style="color:var(--green-l);"></i> Pemasukan</span>
            <p style="font-weight:bold; color:var(--green-l); font-size:15px; margin-top:2px;">${formatRupiah(totalIncome)}</p>
          </div>
          <div>
            <span class="text-muted" style="font-size:11px;"><i class="ti ti-arrow-down-left" style="color:var(--red-l);"></i> Pengeluaran</span>
            <p style="font-weight:bold; color:var(--red-l); font-size:15px; margin-top:2px;">${formatRupiah(totalExpense)}</p>
          </div>
        </div>
      </div>

      <h4 style="margin-bottom:12px; font-weight:600; display:flex; align-items:center; gap:6px;"><i class="ti ti-clock-play" style="color:var(--purple-l)"></i> Monitoring Alokasi Dana</h4>
      <div class="card grid-3" style="padding:12px; gap:8px;">
        
        <div class="monitor-box">
          <span style="font-size:11px; font-weight:bold; color:#fff;">Harian</span>
          <div class="monitor-progress-bar">
            <div class="monitor-fill ${ (currentSpend.daily/state.budgetLimits.daily) > 0.8 ? 'danger' : '' }" style="width: ${Math.min((currentSpend.daily/state.budgetLimits.daily)*100, 100)}%"></div>
          </div>
          <p style="font-size:11px; font-weight:600; margin-top:4px; color:${currentSpend.daily > state.budgetLimits.daily ? 'var(--red-l)' : 'var(--green-l)'}">
            Sisa:<br>${formatRupiah(Math.max(state.budgetLimits.daily - currentSpend.daily, 0))}
          </p>
          <span class="text-muted" style="font-size:9px;">Limit: 100rb</span>
        </div>

        <div class="monitor-box">
          <span style="font-size:11px; font-weight:bold; color:#fff;">Mingguan</span>
          <div class="monitor-progress-bar">
            <div class="monitor-fill ${ (currentSpend.weekly/state.budgetLimits.weekly) > 0.8 ? 'warning' : '' }" style="width: ${Math.min((currentSpend.weekly/state.budgetLimits.weekly)*100, 100)}%"></div>
          </div>
          <p style="font-size:11px; font-weight:600; margin-top:4px; color:${currentSpend.weekly > state.budgetLimits.weekly ? 'var(--red-l)' : 'var(--green-l)'}">
            Sisa:<br>${formatRupiah(Math.max(state.budgetLimits.weekly - currentSpend.weekly, 0))}
          </p>
          <span class="text-muted" style="font-size:9px;">Limit: 700rb</span>
        </div>

        <div class="monitor-box">
          <span style="font-size:11px; font-weight:bold; color:#fff;">Bulanan</span>
          <div class="monitor-progress-bar">
            <div class="monitor-fill" style="width: ${Math.min((currentSpend.monthly/state.budgetLimits.monthly)*100, 100)}%"></div>
          </div>
          <p style="font-size:11px; font-weight:600; margin-top:4px; color:${currentSpend.monthly > state.budgetLimits.monthly ? 'var(--red-l)' : 'var(--green-l)'}">
            Sisa:<br>${formatRupiah(Math.max(state.budgetLimits.monthly - currentSpend.monthly, 0))}
          </p>
          <span class="text-muted" style="font-size:9px;">Limit: 3jt</span>
        </div>

      </div>

      <h4 style="margin-bottom:12px; font-weight:600; display:flex; align-items:center; gap:6px;"><i class="ti ti-chart-pie" style="color:var(--purple-l)"></i> Analisis Anggaran Terpakai</h4>
      <div class="card">
        ${totalExpenseForChart === 0 ? `<p class="text-muted" style="text-align:center; padding:12px;">Belum ada data pengeluaran dicatat.</p>` : `
          <div class="chart-container">
            <svg class="chart-svg" viewBox="0 0 36 36">
              <circle cx="18" cy="18" r="15.915" fill="none" stroke="#252538" stroke-width="4.2"></circle>
              ${(() => {
                let accumulatedPercent = 0;
                return state.categories.expense.map(cat => {
                  const amt = categoryTotals[cat.name] || 0;
                  if(amt === 0) return '';
                  const percent = (amt / totalExpenseForChart) * 100;
                  const dashArray = `${percent} ${100 - percent}`;
                  const dashOffset = 100 - accumulatedPercent;
                  accumulatedPercent += percent;
                  return `<circle cx="18" cy="18" r="15.915" fill="none" stroke="${cat.color}" stroke-width="4.5" stroke-dasharray="${dashArray}" stroke-dashoffset="${dashOffset}"></circle>`;
                }).join('');
              })()}
            </svg>
            <div class="chart-legends">
              ${state.categories.expense.map(cat => {
                const amt = categoryTotals[cat.name] || 0;
                if (amt === 0) return '';
                const pct = ((amt / totalExpenseForChart) * 100).toFixed(0);
                return `
                  <div class="legend-item">
                    <div class="legend-color" style="background: ${cat.color};"></div>
                    <span style="flex:1;">${cat.name} (${pct}%)</span>
                    <span style="font-weight:600;">${formatRupiah(amt)}</span>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        `}
      </div>

      <div class="flex-between" style="margin-bottom: 4px;">
        <h4 style="font-weight:600;"><i class="ti ti-arrows-left-right" style="color:var(--purple-l)"></i> Mutasi Arus Terkini</h4>
        <span class="text-muted" style="cursor:pointer; color:var(--purple-l)" onclick="state.tab='riwayat'; render();">Lihat Semua</span>
      </div>

      <div class="tx-list">
        ${state.transactions.slice(0, 4).map(tx => {
          const config = [...state.categories.expense, ...state.categories.income].find(c => c.name === tx.category) || { color: '#fff', icon: 'ti-category' };
          return `
            <div class="tx-item" style="border-left-color: ${config.color};">
              <div class="tx-info">
                <div class="tx-icon" style="color: ${config.color};"><i class="ti ${config.icon}"></i></div>
                <div>
                  <p style="font-weight:600; font-size:14px;">${tx.name}</p>
                  <span class="text-muted" style="font-size:11px;">${tx.date} • Oleh <b style="color:#fff;">${tx.user}</b></span>
                </div>
              </div>
              <p style="font-weight:bold; font-size:14px; color: ${tx.type==='expense'?'var(--red-l)':'var(--green-l)'}">
                ${tx.type==='expense'?'-':'+'} ${formatRupiah(tx.amount)}
              </p>
            </div>
          `;
        }).join('')}
      </div>
    `;
  } 
  
  // ── TAB RIWAYAT MUTASI PENUH ──
  else if (state.tab === 'riwayat') {
    appHtml += `
      <h4 style="margin-bottom:12px; font-weight:600;"><i class="ti ti-history"></i> Riwayat Seluruh Transaksi</h4>
      <div class="tx-list">
        ${state.transactions.map(tx => {
          const config = [...state.categories.expense, ...state.categories.income].find(c => c.name === tx.category) || { color: '#fff', icon: 'ti-category' };
          return `
            <div class="tx-item" style="border-left-color: ${config.color};">
              <div class="tx-info">
                <div class="tx-icon" style="color: ${config.color};"><i class="ti ${config.icon}"></i></div>
                <div>
                  <p style="font-weight:600; font-size:14px;">${tx.name}</p>
                  <span class="text-muted" style="font-size:11px;">${tx.date} • Pencatat: <b>${tx.user}</b></span>
                </div>
              </div>
              <p style="font-weight:bold; font-size:14px; color: ${tx.type==='expense'?'var(--red-l)':'var(--green-l)'}">
                ${tx.type==='expense'?'-':'+'} ${formatRupiah(tx.amount)}
              </p>
            </div>
          `;
        }).join('')}
      </div>
    `;
  }

  // ── TAB TARGET BERSAMA ──
  else if (state.tab === 'target') {
    appHtml += `
      <h4 style="margin-bottom:12px; font-weight:600;"><i class="ti ti-target-arrow"></i> Target Finansial Bersama</h4>
      <div class="card">
        <div class="flex-between" style="margin-bottom:6px;">
          <span style="font-weight:600;">Tabungan Dana Liburan Akhir Tahun</span>
          <span style="color:var(--purple-l); font-size:12px; font-weight:bold;">45%</span>
        </div>
        <div style="width:100%; height:8px; background:#252538; border-radius:4px; overflow:hidden; margin-bottom:8px;">
          <div style="width:45%; height:100%; background:var(--purple-l);"></div>
        </div>
        <div class="flex-between text-muted" style="font-size:12px;">
          <span>Terkumpul: ${formatRupiah(4500000)}</span>
          <span>Target: ${formatRupiah(10000000)}</span>
        </div>
      </div>
    `;
  }

  // ── TAB PROFIL WORKSPACE ──
  else if (state.tab === 'profile') {
    appHtml += `
      <div class="card" style="text-align:center; padding: 24px 16px;">
        <div style="width:64px; height:64px; background:var(--purple); border-radius:50%; margin:0 auto 12px auto; display:flex; align-items:center; justify-content:center; font-size:24px; font-weight:bold;">A</div>
        <h4>Azman Sidi Habibie</h4>
        <p class="text-muted" style="margin-top:4px;">Anggota Utama Workspace</p>
        <button class="btn" style="background:var(--red); margin-top:20px; padding:8px;" onclick="state.screen='auth'; render();">Keluar Workspace</button>
      </div>
    `;
  }

  // Navigasi Bawah & Floating Action Button Tambah Arus Kas
  appHtml += `
    </div> <button class="fab" onclick="state.modal=true; render();"><i class="ti ti-plus"></i></button>

    <div class="bottom-nav">
      <button class="nav-item ${state.tab==='beranda'?'active':''}" onclick="state.tab='beranda'; render();"><i class="ti ti-smart-home"></i>Beranda</button>
      <button class="nav-item ${state.tab==='riwayat'?'active':''}" onclick="state.tab='riwayat'; render();"><i class="ti ti-history"></i>Riwayat</button>
      <button class="nav-item ${state.tab==='target'?'active':''}" onclick="state.tab='target'; render();"><i class="ti ti-target-arrow"></i>Target</button>
      <button class="nav-item ${state.tab==='profile'?'active':''}" onclick="state.tab='profile'; render();"><i class="ti ti-user"></i>Profil</button>
    </div>

    <div class="modal-backdrop ${state.modal?'open':''}" onclick="if(event.target===this){state.modal=false; render();}">
      <div class="modal-content">
        <h3 style="margin-bottom:20px; font-weight:bold;">Catat Arus Kas</h3>
        <form onsubmit="handleAddTx(event)">
          <div class="form-group">
            <label>Jenis Arus</label>
            <div class="auth-tabs" style="margin-bottom:0;">
              <button type="button" class="auth-tab ${state.newTx.type==='expense'?'active':''}" onclick="state.newTx.type='expense'; state.newTx.category='Makanan'; render();">Pengeluaran</button>
              <button type="button" class="auth-tab ${state.newTx.type==='income'?'active':''}" onclick="state.newTx.type='income'; state.newTx.category='Gaji'; render();">Pemasukan</button>
            </div>
          </div>
          <div class="form-group">
            <label>Kategori</label>
            <select class="form-control" onchange="state.newTx.category=this.value;">
              ${state.categories[state.newTx.type].map(c=>`<option value="${c.name}" ${state.newTx.category===c.name?'selected':''}>${c.name}</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label>Nama Transaksi</label>
            <input type="text" class="form-control" placeholder="Misal: Beli Kopi Wijaya / Gaji Pokok" value="${state.newTx.name}" oninput="state.newTx.name=this.value" required />
          </div>
          <div class="form-group">
            <label>Nominal Rupiah</label>
            <input type="number" class="form-control" placeholder="Contoh: 50000" value="${state.newTx.amount}" oninput="state.newTx.amount=this.value" required />
          </div>
          <div class="form-group">
            <label>Tanggal</label>
            <input type="date" class="form-control" value="${state.newTx.date}" onchange="state.newTx.date=this.value" required />
          </div>
          <button type="submit" class="btn" style="margin-top:10px;">Simpan Transaksi</button>
        </form>
      </div>
    </div>
  `;

  app.innerHTML = appHtml;
}

// Render Pertama Saat Aplikasi Dibuka
render();
</script>
</body>
</html>
