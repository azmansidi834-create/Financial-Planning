<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>kolabuku - Pendamping Finansial Bersama</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
  <script>
    tailwind.config = { darkMode: 'selector' }
  </script>
  <style>
    * {
      transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    
    html[data-theme="light"] {
      --bg-body: #f0f4ff;          
      --bg-card: #ffffff;          
      --text-main: #0f172a;        
      --border: #cbd5e1;           
      --nav-bg: #e0e7ff;           
      
      --pink-primary: #ff4a8b;     
      --green-in: #10b981;         
      --red-out: #f43f5e;          
    }
    html[data-theme="dark"] {
      --bg-body: #0b0c13;          
      --bg-card: #161825;          
      --text-main: #f8fafc;        
      --border: #25283d;           
      --nav-bg: #1c1e30;           
      
      --pink-primary: #ff4a8b;
      --green-in: #10b981;
      --red-out: #f43f5e;
    }
    
    body { background-color: var(--bg-body); color: var(--text-main); }
    .btn-pink { background-color: var(--pink-primary); color: #ffffff; }
    .btn-in { background-color: var(--green-in); color: #ffffff; }
    .btn-out { background-color: var(--red-out); color: #ffffff; }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-start antialiased overflow-x-hidden">

  <div id="app" class="w-full max-w-md min-h-screen flex flex-col relative pb-24"></div>
  <div id="toast-container" class="fixed top-4 z-50 w-full max-w-xs px-4 pointer-events-none flex flex-col gap-2"></div>

  <script>
    const CLOUD_URL = "https://script.google.com/macros/s/AKfycbwPHL7Sq2brnR9EqTaG0AmkufZAdvouTJpCt70a0p7tjnUGsYmJSH_RxydWhP6ImSzgUA/exec";

    const DEFAULT_EXP_CATS = ['Bahan Baku', 'Operasional', 'Makan & Kopi', 'Transport', 'Hiburan', 'Lainnya'];
    const DEFAULT_INC_CATS = ['Omset Penjualan', 'Gaji Pokok', 'Freelance Proyek', 'Investasi'];

    const CATEGORY_ICONS = {
      'Bahan Baku': 'ti-box-seam', 'Operasional': 'ti-settings', 'Makan & Kopi': 'ti-soup',
      'Transport': 'ti-car', 'Hiburan': 'ti-device-gamepad-2', 'Lainnya': 'ti-category',
      'Omset Penjualan': 'ti-building-store', 'Gaji Pokok': 'ti-cash', 'Freelance Proyek': 'ti-briefcase',
      'Investasi': 'ti-trending-up', 'Tabungan / Simpanan': 'ti-pig-money'
    };

    let state = {
      screen: 'auth', theme: 'light', activeTab: 'dashboard', subRiwayatTab: 'expense',
      timeFilter: 'month', showSavings: true, limitModal: false,
      currentUser: null, editingTxId: null, isLoading: false,
      expenseCategories: [...DEFAULT_EXP_CATS],
      incomeCategories: [...DEFAULT_INC_CATS],
      savingGoals: [],
      transactions: [],
      // Target Limit Pengeluaran yang Kini Bisa Di-set Dinamis oleh User via Pop-up
      budgetLimits: { daily: 100000, weekly: 700000, monthly: 3000000 }
    };

    const STATIC_CAT_LIMITS = {
      'Makan & Kopi': 2000000, 'Transport': 1000000, 'Hiburan': 1000000,
      'Bahan Baku': 5000000, 'Operasional': 2000000, 'Lainnya': 1000000
    };

    if(localStorage.getItem('kolabuku_state_final_v16')) {
      const saved = JSON.parse(localStorage.getItem('kolabuku_state_final_v16'));
      state.transactions = saved.transactions || [];
      state.savingGoals = saved.savingGoals || [];
      state.expenseCategories = saved.expenseCategories || state.expenseCategories;
      state.incomeCategories = saved.incomeCategories || state.incomeCategories;
      state.showSavings = saved.showSavings !== undefined ? saved.showSavings : true;
      state.theme = saved.theme || 'light';
      state.budgetLimits = saved.budgetLimits || state.budgetLimits;
    }

    document.documentElement.setAttribute('data-theme', state.theme);

    function saveState() {
      localStorage.setItem('kolabuku_state_final_v16', JSON.stringify({
        transactions: state.transactions, savingGoals: state.savingGoals,
        expenseCategories: state.expenseCategories, incomeCategories: state.incomeCategories,
        showSavings: state.showSavings, theme: state.theme, budgetLimits: state.budgetLimits
      }));
    }

    async function syncToCloud() {
      saveState();
      if(!CLOUD_URL || CLOUD_URL.includes("PASTE_URL")) return;
      try {
        await fetch(CLOUD_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: "save", state: state })
        });
        showToast('☁️ Cloud Sinkron Otomatis!');
      } catch(e) { console.error(e); }
    }

    async function loadFromCloud() {
      if(!CLOUD_URL || CLOUD_URL.includes("PASTE_URL")) return;
      state.isLoading = true; render();
      try {
        const res = await fetch(CLOUD_URL);
        const cloudData = await res.json();
        if(cloudData.transactions) {
          state.transactions = cloudData.transactions;
          state.savingGoals = cloudData.savingGoals || [];
          state.expenseCategories = cloudData.expenseCategories || state.expenseCategories;
          state.incomeCategories = cloudData.incomeCategories || state.incomeCategories;
          state.budgetLimits = cloudData.budgetLimits || state.budgetLimits;
          saveState();
          showToast('📥 Data Cloud Dimuat!');
        }
      } catch(e) { console.error(e); }
      state.isLoading = false; render();
    }

    function formatIDR(num) { return 'Rp ' + Math.round(num).toLocaleString('id-ID'); }

    function getFormattedDate(dateStr) {
      const d = new Date(dateStr);
      return d.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'short', year: 'numeric' });
    }

    function toggleSavingsVisibility() {
      state.showSavings = !state.showSavings;
      saveState();
      render();
    }

    function filterTransactionsByTime(txList) {
      const now = new Date();
      return txList.filter(t => {
        const tDate = new Date(t.date);
        if (state.timeFilter === 'week') {
          const oneWeekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
          return tDate >= oneWeekAgo;
        } else if (state.timeFilter === 'year') {
          return tDate.getFullYear() === now.getFullYear();
        } else {
          return tDate.getMonth() === now.getMonth() && tDate.getFullYear() === now.getFullYear();
        }
      });
    }

    function getPeriodSpendingStats() {
      const now = new Date();
      let daily = 0; let weekly = 0; let monthly = 0;

      state.transactions.forEach(tx => {
        if (tx.type !== 'expense') return;
        const txDate = new Date(tx.date);
        if(txDate.toDateString() === now.toDateString()) daily += tx.amount;
        if((now - txDate) <= 7 * 24 * 60 * 60 * 1000) weekly += tx.amount;
        if(txDate.getMonth() === now.getMonth() && txDate.getFullYear() === now.getFullYear()) monthly += tx.amount;
      });
      return { daily, weekly, monthly };
    }

    function showToast(msg, type='success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `p-3 rounded-xl shadow-xl text-xs font-bold text-white flex items-center gap-2 transform translate-y-2 opacity-0 transition-all duration-300 ${type==='success'?'bg-emerald-500':'bg-rose-500'}`;
      toast.innerHTML = `<i class="ti ti-info-circle text-sm"></i><span>${msg}</span>`;
      container.appendChild(toast);
      setTimeout(() => toast.classList.remove('opacity-0', 'translate-y-2'), 50);
      setTimeout(() => {
        toast.classList.add('opacity-0', 'translate-y-[-10px]');
        setTimeout(() => toast.remove(), 300);
      }, 2500);
    }

    function toggleTheme() {
      state.theme = state.theme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', state.theme);
      saveState();
      render();
    }

    async function handleLogin(e) {
      e.preventDefault();
      const user = document.getElementById('username-in').value.trim();
      if(!user) return;
      state.currentUser = user;
      state.screen = 'main';
      await loadFromCloud();
      render();
    }

    async function saveTransaction(e) {
      e.preventDefault();
      const id = document.getElementById('form-id').value;
      const desc = document.getElementById('form-desc').value.trim();
      const amount = parseInt(document.getElementById('form-amount').value) || 0;
      const category = document.getElementById('form-cat').value;
      const type = state.subRiwayatTab; 

      if(!desc || amount <= 0) return showToast('Harap isi data dengan lengkap!', 'error');

      if(id) {
        const idx = state.transactions.findIndex(t => t.id === id);
        if(idx !== -1) state.transactions[idx] = { ...state.transactions[idx], desc, amount, type, category };
      } else {
        state.transactions.unshift({
          id: Date.now().toString(), date: new Date().toISOString().substring(0,10),
          desc, amount, type, category, user: state.currentUser
        });
      }
      state.editingTxId = null;
      render();
      await syncToCloud();
    }

    function openEdit(id) {
      state.editingTxId = id; state.activeTab = 'riwayat';
      const tx = state.transactions.find(t => t.id === id);
      state.subRiwayatTab = tx.type; render();
      
      document.getElementById('form-id').value = tx.id;
      document.getElementById('form-desc').value = tx.desc;
      document.getElementById('form-amount').value = tx.amount;
      updateFormCategories();
      document.getElementById('form-cat').value = tx.category;
    }

    async function deleteTx(id) {
      if(confirm('Hapus transaksi ini?')) {
        state.transactions = state.transactions.filter(t => t.id !== id);
        showToast('Transaksi dihapus', 'error'); render();
        await syncToCloud();
      }
    }

    async function addNewSavingGoal(e) {
      e.preventDefault();
      const name = document.getElementById('goal-name').value.trim();
      const target = parseInt(document.getElementById('goal-target').value) || 0;
      if(!name || target <= 0) return;
      state.savingGoals.push({ id: 's_' + Date.now(), name, target, current: 0 });
      render(); await syncToCloud();
    }

    async function editSavingGoal(goalId) {
      const goal = state.savingGoals.find(g => g.id === goalId);
      if(!goal) return;
      const newName = prompt("Ubah Nama Target Tabungan:", goal.name);
      if(newName === null || !newName.trim()) return;
      const newTarget = parseInt(prompt("Ubah Target Nominal Anggaran Goals (Rp):", goal.target));
      if(isNaN(newTarget) || newTarget <= 0) return showToast('Nominal target tidak valid!', 'error');
      goal.name = newName.trim(); goal.target = newTarget;
      showToast('🎯 Target Goals berhasil diperbarui!'); render(); await syncToCloud();
    }

    async function updateLimits(e) {
      e.preventDefault();
      state.budgetLimits.daily = parseInt(document.getElementById('limit-daily').value) || 0;
      state.budgetLimits.weekly = parseInt(document.getElementById('limit-weekly').value) || 0;
      state.budgetLimits.monthly = parseInt(document.getElementById('limit-monthly').value) || 0;
      state.limitModal = false;
      showToast('⚙️ Alokasi Monitoring Dana Disimpan!');
      render(); await syncToCloud();
    }

    async function deleteSavingGoal(id) {
      if(confirm('Hapus pos celengan ini?')) {
        state.savingGoals = state.savingGoals.filter(g => g.id !== id);
        render(); await syncToCloud();
      }
    }

    async function addNewCategory(type) {
      const inputId = type === 'expense' ? 'new-exp-cat' : 'new-inc-cat';
      const val = document.getElementById(inputId).value.trim();
      if(!val) return;
      if(type === 'expense') state.expenseCategories.push(val);
      else state.incomeCategories.push(val);
      render(); await syncToCloud();
    }

    function generateSmartAnalysis(totalIn, totalOut) {
      const today = new Date().getDate();
      const dailyAverage = totalOut / (today || 1);
      let dailyStatusHtml = "";
      
      if (dailyAverage > state.budgetLimits.daily) {
        dailyStatusHtml = `<div class="bg-rose-500 text-white p-3 rounded-xl font-bold mb-2 text-xs flex items-center gap-2"><i class="ti ti-alert-triangle-filled"></i> <span>Harian Over-Budget! Rata-rata kas keluar (${formatIDR(dailyAverage)}) melewati limit harian Anda.</span></div>`;
      } else {
        dailyStatusHtml = `<div class="bg-emerald-500 text-white p-3 rounded-xl font-bold mb-2 text-xs flex items-center gap-2"><i class="ti ti-circle-check-filled"></i> <span>Arus Harian Aman! Pengeluaran terkontrol di rata-rata ${formatIDR(dailyAverage)}.</span></div>`;
      }

      let categoryLeakHtml = "";
      const catTotals = {};
      state.transactions.filter(t => t.type === 'expense').forEach(t => { catTotals[t.category] = (catTotals[t.category] || 0) + t.amount; });
      
      let overBudgetCategories = [];
      for (const cat in catTotals) {
        const limit = STATIC_CAT_LIMITS[cat] || 1500000;
        if (catTotals[cat] > limit) { overBudgetCategories.push(`${cat}`); }
      }

      if (overBudgetCategories.length > 0) {
        categoryLeakHtml = `<div class="bg-amber-500 text-white p-3 rounded-xl font-bold mb-3 text-xs"><i class="ti ti-info-square-rounded-filled"></i> Limit jebol pada rincian pos: <span class="underline">${overBudgetCategories.join(', ')}</span>.</div>`;
      } else {
        categoryLeakHtml = `<div class="bg-blue-500 text-white p-3 rounded-xl font-bold mb-3 text-xs"><i class="ti ti-thumb-up-filled"></i> Semua pos pengeluaran kategori bulanan terkendali di dalam batas aman anggaran.</div>`;
      }

      let recommendationHtml = "";
      const totalSaving = state.transactions.filter(t => t.type === 'expense' && t.category === 'Tabungan / Simpanan').reduce((a,b)=>a+b.amount, 0);
      const savingRate = totalIn > 0 ? (totalSaving / totalIn) * 100 : 0;
      if (totalOut > totalIn && totalIn > 0) {
        recommendationHtml = `⚠️ <b>Rekomendasi Bulanan:</b> Defisit anggaran terdeteksi! Segera rem pengeluaran non-pokok untuk minggu ini.`;
      } else if (savingRate < 15 && totalIn > 0) {
        recommendationHtml = `💡 <b>Saran Finansial:</b> Alokasi dana simpanan baru ${Math.round(savingRate)}%. Cobalah prioritaskan menabung di awal bulan.`;
      } else {
        recommendationHtml = `🎉 <b>Saran Finansial:</b> Keuangan dalam performa prima. Sisa surplus kas bebas dialokasikan ke target tabungan terdekat.`;
      }

      return { dailyStatusHtml, categoryLeakHtml, recommendationHtml };
    }

    function render() {
      const root = document.getElementById('app');
      if(state.screen === 'auth') {
        root.innerHTML = `
          <div class="w-full flex-1 flex flex-col items-center justify-center p-6 mt-16 animate-fade-in">
            <div class="w-full bg-[var(--bg-card)] border-2 border-[var(--border)] rounded-[2.5rem] p-6 text-center shadow-xl">
              <h2 class="text-3xl font-black text-[var(--pink-primary)] tracking-tight mb-2 lowercase">kolabuku</h2>
              <p class="text-xs text-gray-400 mb-6 font-medium">Sistem Cloud Pencatatan Finansial Bersama</p>
              <form onsubmit="handleLogin(event)" class="text-left space-y-4">
                <div><label class="text-[10px] font-bold text-gray-400 block mb-1 uppercase tracking-wider">Nama Anggota Pengguna</label>
                <input type="text" id="username-in" required placeholder="Contoh: Azman" class="w-full bg-[var(--bg-body)] border-2 border-[var(--border)] rounded-xl px-4 py-3.5 text-sm font-semibold text-[var(--text-main)] focus:outline-none focus:border-[var(--pink-primary)]"></div>
                <button type="submit" class="w-full bg-[#ff4a8b] text-white font-bold py-3.5 rounded-xl text-sm shadow-md">Masuk & Muat Data →</button>
              </form>
            </div>
          </div>`;
        return;
      }

      const timeFilteredTransactions = filterTransactionsByTime(state.transactions);
      const totalIn = timeFilteredTransactions.filter(t => t.type==='income').reduce((a,b)=>a+b.amount, 0);
      const totalOut = timeFilteredTransactions.filter(t => t.type==='expense').reduce((a,b)=>a+b.amount, 0);
      
      const akumulasiTabunganRiil = state.transactions.filter(t => t.type === 'expense' && t.category === 'Tabungan / Simpanan').reduce((a,b)=>a+b.amount, 0);
      const saldo = totalIn - totalOut;

      state.savingGoals.forEach(g => {
        const matches = state.transactions.filter(t => t.type === 'expense' && t.category === 'Tabungan / Simpanan' && t.desc.toLowerCase() === g.name.toLowerCase());
        g.current = matches.reduce((acc, curr) => acc + curr.amount, 0);
      });

      root.innerHTML = `
        <header class="w-full bg-[var(--bg-card)] border-b-2 border-[var(--border)] p-4 flex items-center justify-between sticky top-0 z-40 backdrop-blur-md">
          <h1 class="font-black text-lg tracking-tight text-[var(--text-main)] lowercase">kolabuku ${state.isLoading?'(...)':''}</h1>
          <div class="flex items-center gap-2">
            <button onclick="toggleTheme()" class="w-9 h-9 bg-[var(--bg-body)] border-2 border-[var(--border)] rounded-full flex items-center justify-center text-lg shadow-sm"><i class="ti ${state.theme==='dark'?'ti-sun text-amber-400':'ti-moon text-indigo-600'}"></i></button>
            <button onclick="state.screen='auth'; render();" class="w-9 h-9 bg-rose-500/10 text-rose-500 rounded-full flex items-center justify-center text-lg"><i class="ti ti-logout"></i></button>
          </div>
        </header>

        <main class="w-full px-4 pt-4 flex-1 pb-12">${renderTabContent(saldo, totalIn, totalOut, timeFilteredTransactions, akumulasiTabunganRiil)}</main>

        <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto h-20 bg-[var(--nav-bg)] border-t-2 border-[var(--border)] flex justify-around items-center z-50 px-2 rounded-t-[2rem] shadow-2xl">
          <button onclick="state.activeTab='dashboard'; render()" class="flex flex-col items-center justify-center text-[10px] font-black ${state.activeTab==='dashboard'?'text-[var(--pink-primary)]':'text-gray-400'}"><i class="ti ti-smart-home text-xl mb-0.5"></i>Beranda</button>
          <button onclick="state.activeTab='riwayat'; render()" class="flex flex-col items-center justify-center text-[10px] font-black ${state.activeTab==='riwayat'?'text-[var(--pink-primary)]':'text-gray-400'}"><i class="ti ti-receipt text-xl mb-0.5"></i>Riwayat</button>
          <button onclick="state.activeTab='tabungan'; render()" class="flex flex-col items-center justify-center text-[10px] font-black ${state.activeTab==='tabungan'?'text-[var(--pink-primary)]':'text-gray-400'}"><i class="ti ti-pig-money text-xl mb-0.5"></i>Tabungan</button>
          <button onclick="state.activeTab='settings'; render()" class="flex flex-col items-center justify-center text-[10px] font-black ${state.activeTab==='settings'?'text-[var(--pink-primary)]':'text-gray-400'}"><i class="ti ti-settings text-xl mb-0.5"></i>Kategori</button>
        </nav>
        
        <div class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 ${state.limitModal?'flex':'hidden'} items-end justify-center p-4" onclick="if(event.target===this){state.limitModal=false;render()}">
          <div class="bg-[var(--bg-card)] border border-[var(--border)] rounded-3xl w-full max-w-md p-5 animate-in slide-in-from-bottom duration-200">
            <h3 class="text-sm font-bold uppercase tracking-wider text-[var(--pink-primary)] mb-4">⚙️ Atur Limit Alokasi Dana</h3>
            <form onsubmit="updateLimits(event)" class="space-y-3 text-xs text-left">
              <div><label class="block text-gray-400 font-bold mb-1">Limit Harian (Rp)</label><input type="number" id="limit-daily" value="${state.budgetLimits.daily}" class="w-full bg-[var(--bg-body)] border-2 border-[var(--border)] rounded-xl p-3 text-[var(--text-main)] font-bold"></div>
              <div><label class="block text-gray-400 font-bold mb-1">Limit Mingguan (Rp)</label><input type="number" id="limit-weekly" value="${state.budgetLimits.weekly}" class="w-full bg-[var(--bg-body)] border-2 border-[var(--border)] rounded-xl p-3 text-[var(--text-main)] font-bold"></div>
              <div><label class="block text-gray-400 font-bold mb-1">Limit Bulanan (Rp)</label><input type="number" id="limit-monthly" value="${state.budgetLimits.monthly}" class="w-full bg-[var(--bg-body)] border-2 border-[var(--border)] rounded-xl p-3 text-[var(--text-main)] font-bold"></div>
              <button type="submit" class="w-full bg-[var(--pink-primary)] text-white font-bold py-3 rounded-xl shadow-md mt-2">Terapkan Batas Anggaran</button>
            </form>
          </div>
        </div>`;
      if(state.activeTab === 'riwayat') updateFormCategories();
    }

    function renderTabContent(saldo, totalIn, totalOut, timeFilteredTransactions, akumulasiTabunganRiil) {
      if(state.activeTab === 'dashboard') {
        const currentSpend = getPeriodSpendingStats();
        const smartAnalysis = generateSmartAnalysis(totalIn, totalOut);
        
        const catTotals = {};
        let totalExpenseForChart = 0;
        state.transactions.filter(t => t.type === 'expense').forEach(t => {
          catTotals[t.category] = (catTotals[t.category] || 0) + t.amount;
          totalExpenseForChart += t.amount;
        });

        const CHART_COLORS = ['#f43f5e', '#3b82f6', '#f59e0b', '#10b981', '#a855f7', '#6b7280'];

        return `
          <div class="bg-[var(--pink-primary)] rounded-[2rem] p-6 text-white shadow-xl mb-4 border-b-4 border-black/20">
            <span class="text-xs font-bold uppercase tracking-wider opacity-90">Sisa Saldo Kas Riil</span>
            <h2 class="text-3xl font-black my-1 tracking-tight">${formatIDR(saldo)}</h2>
            <div class="grid grid-cols-2 gap-3 mt-5 pt-4 border-t-2 border-white/20">
              <div class="bg-black/20 p-3 rounded-2xl"><span class="text-[9px] uppercase font-bold opacity-80 block">Total Masuk</span><span class="text-emerald-300 text-sm font-black">+ ${formatIDR(totalIn)}</span></div>
              <div class="bg-black/20 p-3 rounded-2xl"><span class="text-[9px] uppercase font-bold opacity-80 block">Total Keluar</span><span class="text-rose-300 text-sm font-black">- ${formatIDR(totalOut)}</span></div>
            </div>
          </div>

          <div class="bg-gradient-to-r from-blue-600 to-indigo-600 rounded-3xl p-5 text-white shadow-lg border-b-4 border-black/15 flex items-center justify-between mb-5">
            <div>
              <span class="text-[10px] block opacity-80 font-bold uppercase tracking-wider mb-1">Total Tabungan Bersama</span>
              <h3 class="text-xl font-black tracking-tight">${state.showSavings ? formatIDR(akumulasiTabunganRiil) : '•••••••'}</h3>
            </div>
            <button onclick="toggleSavingsVisibility()" class="w-9 h-9 bg-white/10 rounded-full flex items-center justify-center text-lg">
              <i class="ti ${state.showSavings ? 'ti-eye' : 'ti-eye-off'}"></i>
            </button>
          </div>

          <div class="flex items-center justify-between mb-2"><h3 class="text-xs font-bold uppercase tracking-wider text-gray-400"><i class="ti ti-clock-play text-indigo-500"></i> Monitoring Alokasi Dana <span class="text-[9px] text-gray-400 lowercase italic">(klik box untuk setting)</span></h3></div>
          <div class="grid grid-cols-3 gap-2.5 mb-5 select-none">
            <div onclick="state.limitModal=true;render()" class="bg-[var(--bg-card)] border-2 border-[var(--border)] p-3 rounded-2xl text-center shadow-sm active:scale-95 cursor-pointer">
              <span class="text-[10px] font-bold text-gray-400 block uppercase">Harian</span>
              <div class="w-full bg-gray-200 dark:bg-gray-800 h-1.5 rounded-full my-2 overflow-hidden">
                <div class="h-full bg-rose-500" style="width: ${Math.min((currentSpend.daily/state.budgetLimits.daily)*100, 100)}%"></div>
              </div>
              <p class="text-[10px] font-black ${currentSpend.daily > state.budgetLimits.daily ? 'text-rose-500' : 'text-emerald-500'}">Sisa:<br>${formatIDR(Math.max(state.budgetLimits.daily - currentSpend.daily, 0))}</p>
              <span class="text-[9px] text-gray-400 block mt-1">Limit: ${state.budgetLimits.daily/1000}rb</span>
            </div>
            <div onclick="state.limitModal=true;render()" class="bg-[var(--bg-card)] border-2 border-[var(--border)] p-3 rounded-2xl text-center shadow-sm active:scale-95 cursor-pointer">
              <span class="text-[10px] font-bold text-gray-400 block uppercase">Mingguan</span>
              <div class="w-full bg-gray-200 dark:bg-gray-800 h-1.5 rounded-full my-2 overflow-hidden">
                <div class="h-full bg-amber-500" style="width: ${Math.min((currentSpend.weekly/state.budgetLimits.weekly)*100, 100)}%"></div>
              </div>
              <p class="text-[10px] font-black ${currentSpend.weekly > state.budgetLimits.weekly ? 'text-rose-500' : 'text-emerald-500'}">Sisa:<br>${formatIDR(Math.max(state.budgetLimits.weekly - currentSpend.weekly, 0))}</p>
              <span class="text-[9px] text-gray-400 block mt-1">Limit: ${state.budgetLimits.weekly/1000}rb</span>
            </div>
            <div onclick="state.limitModal=true;render()" class="bg-[var(--bg-card)] border-2 border-[var(--border)] p-3 rounded-2xl text-center shadow-sm active:scale-95 cursor-pointer">
              <span class="text-[10px] font-bold text-gray-400 block uppercase">Bulanan</span>
              <div class="w-full bg-gray-200 dark:bg-gray-800 h-1.5 rounded-full my-2 overflow-hidden">
                <div class="h-full bg-purple-500" style="width: ${Math.min((currentSpend.monthly/state.budgetLimits.monthly)*100, 100)}%"></div>
              </div>
              <p class="text-[10px] font-black ${currentSpend.monthly > state.budgetLimits.monthly ? 'text-rose-500' : 'text-emerald-500'}">Sisa:<br>${formatIDR(Math.max(state.budgetLimits.monthly - currentSpend.monthly, 0))}</p>
              <span class="text-[9px] text-gray-400 block mt-1">Limit: ${state.budgetLimits.monthly/1000000}jt</span>
            </div>
          </div>

          <div class="flex items-center justify-between mb-2 mt-4"><h3 class="text-xs font-bold uppercase tracking-wider text-gray-400"><i class="ti ti-brain text-[var(--pink-primary)]"></i> Evaluasi & Analisis Cerdas</h3></div>
          <div class="space-y-1 mb-5">
            ${smartAnalysis.dailyStatusHtml}
            ${smartAnalysis.categoryLeakHtml}
            <div class="bg-[var(--bg-card)] border-2 border-[var(--border)] text-[var(--text-main)] p-4 rounded-2xl text-xs font-medium shadow-md">
              <i class="ti ti-bulb-filled text-amber-500 text-sm mr-1"></i> ${smartAnalysis.recommendationHtml}
            </div>
          </div>

          <div class="flex items-center justify-between mb-2"><h3 class="text-xs font-bold uppercase tracking-wider text-gray-400"><i class="ti ti-chart-pie text-[var(--pink-primary)]"></i> Proporsi Sektor Belanja</h3></div>
          <div class="bg-[var(--bg-card)] border-2 border-[var(--border)] rounded-3xl p-4 mb-5 shadow-sm">
            ${totalExpenseForChart === 0 ? `<p class="text-xs text-gray-400 text-center py-4">Belum ada data belanja yang keluar bulan ini.</p>` : `
              <div class="flex items-center justify-center gap-6">
                <svg class="w-24 h-24 transform -rotate-90" viewBox="0 0 36 36">
                  <circle cx="18" cy="18" r="15.915" fill="none" stroke="var(--border)" stroke-width="4"></circle>
                  ${(() => {
                    let accPercent = 0;
                    return Object.keys(catTotals).map((catName, idx) => {
                      const pct = (catTotals[catName] / totalExpenseForChart) * 100;
                      const dArray = `${pct} ${100 - pct}`;
                      const dOffset = 100 - accPercent;
                      accPercent += pct;
                      return `<circle cx="18" cy="18" r="15.915" fill="none" stroke="${CHART_COLORS[idx % CHART_COLORS.length]}" stroke-width="4.5" stroke-dasharray="${dArray}" stroke-dashoffset="${dOffset}"></circle>`;
                    }).join('');
                  })()}
                </svg>
                <div class="flex-1 space-y-1.5 text-[11px] font-bold">
                  ${Object.keys(catTotals).slice(0, 4).map((catName, idx) => `
                    <div class="flex items-center justify-between">
                      <div class="flex items-center gap-1.5 truncate">
                        <span class="w-2.5 h-2.5 rounded-sm inline-block shrink-0" style="background: ${CHART_COLORS[idx % CHART_COLORS.length]}"></span>
                        <span class="truncate text-[var(--text-main)]">${catName}</span>
                      </div>
                      <span class="text-gray-400 ml-1 font-mono">${((catTotals[catName]/totalExpenseForChart)*100).toFixed(0)}%</span>
                    </div>
                  `).join('')}
                </div>
              </div>
            `}
          </div>

          <div class="flex items-center justify-between mb-2 mt-4"><h3 class="text-xs font-bold uppercase tracking-wider text-gray-400"><i class="ti ti-history text-pink-500"></i> Mutasi Arus Terkini</h3></div>
          <div class="bg-[var(--bg-card)] border-2 border-[var(--border)] rounded-3xl divide-y divide-[var(--border)] px-4 shadow-md">
            ${state.transactions.length === 0 ? '<p class="text-center py-6 text-xs text-gray-500">Belum ada transaksi harian.</p>': state.transactions.slice(0,4).map(t => {
              const iconCode = CATEGORY_ICONS[t.category] || 'ti-category';
              const isInc = t.type === 'income';
              return `
              <div class="py-3.5 flex justify-between items-center text-xs">
                <div class="flex items-center gap-3">
                  <div class="w-9 h-9 rounded-xl flex items-center justify-center text-base ${isInc?'bg-emerald-500/10 text-emerald-500':'bg-rose-500/10 text-rose-500'}">
                    <i class="ti ${iconCode}"></i>
                  </div>
                  <div>
                    <h4 class="font-bold text-sm text-[var(--text-main)]">${t.desc}</h4>
                    <span class="text-[10px] font-medium text-gray-400 block mt-0.5">${getFormattedDate(t.date)} • ${t.category} • Oleh ${t.user}</span>
                  </div>
                </div>
                <span class="font-black text-sm ${isInc?'text-emerald-600 dark:text-emerald-400':'text-rose-600 dark:text-rose-400'}">${isInc?'+':'-'} ${formatIDR(t.amount)}</span>
              </div>`;
            }).join('')}
          </div>`;
      }

      if(state.activeTab === 'riwayat') {
        const isExp = state.subRiwayatTab === 'expense';
        return `
          <div class="bg-[var(--bg-card)] border-2 border-[var(--border)] rounded-3xl p-5 shadow-md mb-5">
            <div class="flex items-center gap-2 mb-3">
              <span class="w-2 h-4 ${isExp?'bg-[var(--red-out)]':'bg-[var(--green-in)]'} rounded-full"></span>
              <h3 class="text-xs font-bold uppercase tracking-wider text-[var(--text-main)]">${state.editingTxId ? '⚙️ Perbarui Rekap' : '✍️ Catat Data ' + (isExp ? 'Pengeluaran' : 'Pemasukan')}</h3>
            </div>
            
            <form onsubmit="saveTransaction(event)" class="space-y-4 text-xs">
              <input type="hidden" id="form-id">
              <div>
                <label class="block text-gray-400 font-bold mb-1.5">Kategori Rincian</label>
                <select id="form-cat" class="w-full bg-[var(--bg-body)] border-2 border-[var(--border)] rounded-xl p-3 text-xs font-bold focus:outline-none focus:border-pink-500 text-[var(--text-main)]"></select>
              </div>
              <div>
                <label class="block text-gray-400 font-bold mb-1.5">Keterangan Transaksi</label>
                <input type="text" id="form-desc" required placeholder="Tulis rincian deskripsi..." class="w-full bg-[var(--bg-body)] border-2 border-[var(--border)] rounded-xl p-3 text-xs font-semibold focus:outline-none focus:border-pink-500 text-[var(--text-main)]">
              </div>
              <div>
                <label class="block text-gray-400 font-bold mb-1.5">Nominal Angka (Rp)</label>
                <input type="number" id="form-amount" required placeholder="0" class="w-full bg-[var(--bg-body)] border-2 border-[var(--border)] rounded-xl p-3 text-xs font-black focus:outline-none focus:border-pink-500 text-[var(--text-main)]">
              </div>
              <button type="submit" class="w-full ${isExp?'btn-out':'btn-in'} text-white font-bold py-3 rounded-xl text-xs shadow-sm border-b-4 border-black/15">
                <i class="ti ti-device-floppy mr-1"></i> Simpan Catatan Kas
              </button>
            </form>
          </div>

          <div class="w-full flex bg-[var(--bg-card)] border-2 border-[var(--border)] p-1.5 rounded-2xl mb-3 shadow-sm">
            <button onclick="state.subRiwayatTab='expense'; render()" class="flex-1 py-2.5 text-xs font-extrabold rounded-xl ${isExp?'bg-[var(--red-out)] text-white shadow-md':'text-gray-400'}">📉 Pengeluaran</button>
            <button onclick="state.subRiwayatTab='income'; render()" class="flex-1 py-2.5 text-xs font-extrabold rounded-xl ${!isExp?'bg-[var(--green-in)] text-white shadow-md':'text-gray-400'}">📈 Pemasukan</button>
          </div>

          <div class="w-full flex bg-[var(--bg-card)] border-2 border-[var(--border)] p-1 rounded-xl mb-4 gap-1">
            <button onclick="state.timeFilter='week'; render()" class="flex-1 py-1.5 text-[10px] font-bold rounded-lg ${state.timeFilter==='week'?'bg-indigo-600 text-white':'text-gray-400'}"><i class="ti ti-calendar-event"></i> Minggu</button>
            <button onclick="state.timeFilter='month'; render()" class="flex-1 py-1.5 text-[10px] font-bold rounded-lg ${state.timeFilter==='month'?'bg-indigo-600 text-white':'text-gray-400'}"><i class="ti ti-calendar-stats"></i> Bulan</button>
            <button onclick="state.timeFilter='year'; render()" class="flex-1 py-1.5 text-[10px] font-bold rounded-lg ${state.timeFilter==='year'?'bg-indigo-600 text-white':'text-gray-400'}"><i class="ti ti-calendar-time"></i> Tahun</button>
          </div>

          <div class="bg-[var(--bg-card)] border-2 border-[var(--border)] rounded-3xl divide-y divide-[var(--border)] px-4 mb-4 max-h-64 overflow-y-auto shadow-sm">
            ${timeFilteredTransactions.length === 0 ? '<p class="text-center py-6 text-xs text-gray-500">Belum ada catatan pada periode ini.</p>' : timeFilteredTransactions.filter(t => isExp ? t.type==='expense' : t.type==='income').map(t => `
              <div class="py-3.5 flex justify-between items-center text-xs">
                <div>
                  <h4 class="font-bold text-sm text-[var(--text-main)]">${t.desc}</h4>
                  <span class="text-[10px] text-gray-400 block mt-0.5">${getFormattedDate(t.date)} • ${t.category}</span>
                </div>
                <div class="flex items-center gap-2">
                  <span class="font-black text-sm ${isExp?'text-[var(--red-out)]':'text-[var(--green-in)]'}">${formatIDR(t.amount)}</span>
                  <button onclick="openEdit('${t.id}')" class="w-7 h-7 bg-blue-500/10 text-blue-500 rounded-lg flex items-center justify-center text-sm"><i class="ti ti-edit"></i></button>
                  <button onclick="deleteTx('${t.id}')" class="w-7 h-7 bg-rose-500/10 text-rose-500 rounded-lg flex items-center justify-center text-sm"><i class="ti ti-trash"></i></button>
                </div>
              </div>`).join('')}
          </div>`;
      }

      if(state.activeTab === 'tabungan') {
        return `
          <div class="flex items-center justify-between mb-3"><h3 class="text-xs font-bold uppercase tracking-wider text-gray-400"><i class="ti ti-target text-[var(--green-in)]"></i> Target Alokasi Sinking Fund</h3></div>
          <div class="space-y-3 mb-5">
            ${state.savingGoals.length === 0 ? '<p class="text-center bg-[var(--bg-card)] border-2 border-[var(--border)] py-6 text-xs text-gray-500 rounded-xl">Belum ada target pos tabungan bersama.</p>' : state.savingGoals.map(g => {
              const pct = Math.min(100, Math.round((g.current / g.target) * 100)) || 0;
              return `
                <div class="bg-[var(--bg-card)] border-2 border-[var(--border)] rounded-2xl p-4 relative shadow-md">
                  <div class="flex justify-between font-bold text-xs mb-1.5 pr-20"><span>${g.name}</span><span class="text-emerald-500 font-mono font-black">${pct}%</span></div>
                  <div class="flex justify-between text-[10px] text-gray-400 mb-2"><span>Ada: ${formatIDR(g.current)}</span><span>Target: ${formatIDR(g.target)}</span></div>
                  <div class="w-full bg-[var(--bg-body)] h-2.5 rounded-full overflow-hidden border-2 border-[var(--border)]"><div class="h-full bg-[var(--green-in)] rounded-full" style="width: ${pct}%"></div></div>
                  
                  <div class="absolute right-2.5 top-4 flex gap-1">
                    <button onclick="editSavingGoal('${g.id}')" class="w-7 h-7 bg-blue-500/10 text-blue-500 rounded-lg flex items-center justify-center text-sm" title="Edit Goals"><i class="ti ti-pencil"></i></button>
                    <button onclick="deleteSavingGoal('${g.id}')" class="w-7 h-7 bg-rose-500/10 text-rose-500 rounded-lg flex items-center justify-center text-sm" title="Hapus"><i class="ti ti-trash"></i></button>
                  </div>
                </div>`;
            }).join('')}
          </div>
          <div class="bg-[var(--bg-card)] border-2 border-[var(--border)] rounded-3xl p-5 shadow-md">
            <h3 class="text-xs font-bold uppercase text-[var(--green-in)] mb-3">🎯 Set Target Celengan Baru</h3>
            <form onsubmit="addNewSavingGoal(event)" class="space-y-3 text-xs">
              <div><label class="block text-gray-400 font-bold mb-1">Nama Target Tabungan</label><input type="text" id="goal-name" required placeholder="Misal: Laptop Baru Kerja" class="w-full bg-[var(--bg-body)] border-2 border-[var(--border)] rounded-xl p-3 text-xs font-semibold focus:outline-none focus:border-[var(--green-in)] text-[var(--text-main)]"></div>
              <div><label class="block text-gray-400 font-bold mb-1">Target Jumlah Dana (Rp)</label><input type="number" id="goal-target" required placeholder="0" class="w-full bg-[var(--bg-body)] border-2 border-[var(--border)] rounded-xl p-3 text-xs font-black focus:outline-none focus:border-[var(--green-in)] text-[var(--text-main)]"></div>
              <button type="submit" class="w-full bg-[var(--green-in)] text-white font-bold py-3 rounded-xl text-xs shadow-sm border-b-4 border-black/15">Kunci Target</button>
            </form>
          </div>`;
      }

      if(state.activeTab === 'settings') {
        return `
          <div class="flex items-center justify-between mb-3"><h3 class="text-xs font-bold uppercase tracking-wider text-gray-400"><i class="ti ti-settings text-indigo-500"></i> Kustomisasi Kategori Finansial</h3></div>
          <div class="bg-[var(--bg-card)] border-2 border-[var(--border)] rounded-3xl p-5 space-y-5 shadow-md text-xs mb-4">
            <div>
              <label class="block text-gray-400 font-bold text-[10px] uppercase mb-1.5 tracking-wider">Rincian Pos Pengeluaran (Expense)</label>
              <div class="flex gap-2 mb-2">
                <input type="text" id="new-exp-cat" placeholder="Contoh: Pembelian Alat" class="flex-1 bg-[var(--bg-body)] border-2 border-[var(--border)] rounded-lg p-2.5 text-xs text-[var(--text-main)] font-semibold">
                <button onclick="addNewCategory('expense')" class="bg-[#ff4a8b] text-white font-bold px-3 rounded-xl text-xs">Add</button>
              </div>
              <div class="flex flex-wrap gap-1.5 bg-[var(--bg-body)] p-2.5 rounded-2xl border-2 border-[var(--border)]">
                ${state.expenseCategories.map(c => `<span class="bg-[var(--bg-card)] px-2.5 py-1 border-2 border-[var(--border)] rounded-lg text-[10px] font-bold text-[var(--text-main)] shadow-sm">${c}</span>`).join('')}
              </div>
            </div>
            <div class="border-t-2 border-[var(--border)] pt-4">
              <label class="block text-gray-400 font-bold text-[10px] uppercase mb-1.5 tracking-wider">Rincian Pos Pemasukan (Income)</label>
              <div class="flex gap-2 mb-2">
                <input type="text" id="new-inc-cat" placeholder="Contoh: Sales Event" class="flex-1 bg-[var(--bg-body)] border-2 border-[var(--border)] rounded-lg p-2.5 text-xs text-[var(--text-main)] font-semibold">
                <button onclick="addNewCategory('income')" class="bg-blue-600 text-white font-bold px-3 rounded-xl text-xs">Add</button>
              </div>
              <div class="flex flex-wrap gap-1.5 bg-[var(--bg-body)] p-2.5 rounded-2xl border-2 border-[var(--border)]">
                ${state.incomeCategories.map(c => `<span class="bg-[var(--bg-card)] px-2.5 py-1 border-2 border-[var(--border)] rounded-lg text-[10px] font-bold text-[var(--text-main)] shadow-sm">${c}</span>`).join('')}
              </div>
            </div>
          </div>`;
      }
    }

    function updateFormCategories() {
      const catSel = document.getElementById('form-cat'); if(!catSel) return;
      const arr = state.subRiwayatTab === 'expense' ? state.expenseCategories : state.incomeCategories;
      
      let optionsHtml = arr.map(c => `<option value="${c}">${c}</option>`).join('');
      if(state.subRiwayatTab === 'expense') {
        optionsHtml += `<option value="Tabungan / Simpanan">💰 Tabungan / Simpanan</option>`;
      }
      catSel.innerHTML = optionsHtml;
    }

    render();
  </script>
</body>
</html>
