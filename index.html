<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KitaFinance - Pendamping Finansial Bersama</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
  <script>
    // Konfigurasi Tailwind untuk mendukung dual-theme class-based atau attribute-based
    tailwind.config = {
      darkMode: 'selector',
    }
  </script>
  <style>
    /* Custom style tambahan untuk transisi warna halus */
    * {
      transition: background-color 0.25s ease, border-color 0.25s ease, color 0.25s ease;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    html[data-theme="light"] {
      --bg-body: #f4f7fe;
      --bg-card: #ffffff;
      --text-main: #1e1b4b;
      --border: #e2e8f0;
    }
    html[data-theme="dark"] {
      --bg-body: #0b0b14;
      --bg-card: #161624;
      --text-main: #f3f4f6;
      --border: #24243a;
    }
    body { background-color: var(--bg-body); color: var(--text-main); }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-start antialiased overflow-x-hidden">

  <div id="app" class="w-full max-w-md min-h-screen flex flex-col relative pb-24"></div>

  <div id="toast-container" class="fixed top-4 z-50 w-full max-w-xs px-4 pointer-events-none flex flex-col gap-2"></div>

  <script>
    // ── DATABASE / STATE MANAGEMENT (LocalStorage Persist)
    const DEFAULT_CATS = ['Bahan Baku', 'Operasional', 'Makan & Kopi', 'Transport', 'Hiburan', 'Lainnya'];
    const DEFAULT_SAVINGS = ['💻 Laptop Baru', '💰 Dana Darurat', '🏖️ Liburan'];

    let state = {
      screen: 'auth', // auth | main
      authTab: 'login', // login | register
      theme: 'dark', // dark | light
      activeTab: 'dashboard', // dashboard | riwayat | budgeting | tabungan
      subRiwayatTab: 'expense', // expense | income
      currentUser: null,
      editingTxId: null,

      // Data Arrays
      categories: [...DEFAULT_CATS],
      savingGoals: [
        { name: '💻 Laptop Baru', target: 10000000, current: 5000000 },
        { name: '💰 Dana Darurat', target: 5000000, current: 1200000 }
      ],
      budgets: [
        { category: 'Makan & Kopi', limit: 2000000 },
        { category: 'Transport', limit: 800000 }
      ],
      transactions: [
        { id: '1', date: '2026-05-19', desc: 'Beli Kopi di Wijaya', amount: 35000, type: 'expense', category: 'Makan & Kopi', user: 'Azman' },
        { id: '2', date: '2026-05-18', desc: 'Omset Sales Rock and Ross', amount: 1500000, type: 'income', category: 'Omset', user: 'Azman' }
      ]
    };

    // Load Data Terbuka
    if(localStorage.getItem('kita_finance_state')) {
      const saved = JSON.parse(localStorage.getItem('kita_finance_state'));
      state.transactions = saved.transactions || state.transactions;
      state.budgets = saved.budgets || state.budgets;
      state.savingGoals = saved.savingGoals || state.savingGoals;
      state.categories = saved.categories || state.categories;
    }

    function saveState() {
      localStorage.setItem('kita_finance_state', JSON.stringify({
        transactions: state.transactions, budgets: state.budgets, savingGoals: state.savingGoals, categories: state.categories
      }));
    }

    // ── INTERFACES & UTILITIES ──
    function formatIDR(num) {
      return 'Rp ' + Math.round(num).toLocaleString('id-ID');
    }

    function showToast(msg, type='success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `p-3 rounded-xl shadow-lg text-xs font-semibold text-white flex items-center gap-2 transform translate-y-2 opacity-0 transition-all duration-300 ${type==='success'?'bg-emerald-600':'bg-rose-600'}`;
      toast.innerHTML = `<i class="ti ti-info-circle text-base"></i><span>${msg}</span>`;
      container.appendChild(toast);
      setTimeout(() => toast.classList.remove('opacity-0', 'translate-y-2'), 50);
      setTimeout(() => {
        toast.classList.add('opacity-0', 'translate-y-[-10px]');
        setTimeout(() => toast.remove(), 300);
      }, 2500);
    }

    // ── THEME ENGINE (DARK/LIGHT SWITCHER) ──
    function toggleTheme() {
      const html = document.documentElement;
      if (state.theme === 'dark') {
        state.theme = 'light';
        html.setAttribute('data-theme', 'light');
        html.classList.remove('dark');
      } else {
        state.theme = 'dark';
        html.setAttribute('data-theme', 'dark');
        html.classList.add('dark');
      }
      render();
    }

    // ── CRUD HANDLERS ──
    function handleLogin(e) {
      e.preventDefault();
      const user = document.getElementById('username-in').value.trim();
      if(!user) return;
      state.currentUser = user;
      state.screen = 'main';
      showToast(`Selamat datang, ${user}!`);
      render();
    }

    function saveTransaction(e) {
      e.preventDefault();
      const id = document.getElementById('form-id').value;
      const desc = document.getElementById('form-desc').value.trim();
      const amount = parseInt(document.getElementById('form-amount').value) || 0;
      const type = document.getElementById('form-type').value;
      const category = document.getElementById('form-cat').value;

      if(!desc || amount <= 0) return showToast('Isi data dengan valid!', 'error');

      if(id) {
        const idx = state.transactions.findIndex(t => t.id === id);
        if(idx !== -1) {
          state.transactions[idx] = { ...state.transactions[idx], desc, amount, type, category };
          showToast('Transaksi diperbarui!');
        }
      } else {
        state.transactions.unshift({
          id: Date.now().toString(), date: new Date().toISOString().substring(0,10),
          desc, amount, type, category, user: state.currentUser
        });
        showToast('Transaksi baru ditambahkan!');
      }
      saveState();
      state.editingTxId = null;
      render();
    }

    function openEdit(id) {
      state.editingTxId = id;
      state.activeTab = 'riwayat';
      render();
      const tx = state.transactions.find(t => t.id === id);
      document.getElementById('form-id').value = tx.id;
      document.getElementById('form-desc').value = tx.desc;
      document.getElementById('form-amount').value = tx.amount;
      document.getElementById('form-type').value = tx.type;
      document.getElementById('form-cat').value = tx.category;
    }

    function deleteTx(id) {
      if(confirm('Hapus transaksi ini?')) {
        state.transactions = state.transactions.filter(t => t.id !== id);
        saveState();
        showToast('Transaksi dihapus', 'error');
        render();
      }
    }

    // ── MAIN RENDER ──
    function render() {
      const root = document.getElementById('app');
      
      // MODE SCREEN OAUTH
      if(state.screen === 'auth') {
        root.innerHTML = `
          <div class="w-full flex-1 flex flex-col items-center justify-center p-6 mt-16">
            <div class="w-full bg-[var(--bg-card)] border border-[var(--border)] rounded-3xl p-6 shadow-xl text-center">
              <div class="w-14 h-14 bg-indigo-600/10 rounded-2xl flex items-center justify-center text-indigo-500 mx-auto mb-4">
                <i class="ti ti-wallet text-3xl"></i>
              </div>
              <h2 class="text-xl font-bold">Buku Keuangan Bersama</h2>
              <p class="text-xs text-gray-400 mt-1 mb-6">Pencatatan kas personal & Rock and Ross otomatis harian</p>
              
              <form onsubmit="handleLogin(event)" class="text-left space-y-4">
                <div>
                  <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider block mb-1">Nama Kamu</label>
                  <input type="text" id="username-in" required placeholder="Contoh: Azman" class="w-full bg-[var(--bg-body)] border border-[var(--border)] rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500">
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white font-semibold py-3 rounded-xl shadow-lg shadow-indigo-600/20 text-sm">Masuk Dashboard →</button>
              </form>
            </div>
          </div>
        `;
        return;
      }

      // MODE MAIN UTAMA (MOBILE LAYOUT RESPONSIVE)
      // Perhitungan kas harian
      const totalIn = state.transactions.filter(t => t.type==='income').reduce((a,b)=>a+b.amount, 0);
      const totalOut = state.transactions.filter(t => t.type==='expense').reduce((a,b)=>a+b.amount, 0);
      const saldo = totalIn - totalOut;

      root.innerHTML = `
        <header class="w-full bg-[var(--bg-card)] border-b border-[var(--border)] p-4 flex items-center justify-between sticky top-0 z-40">
          <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white"><i class="ti ti-wallet"></i></div>
            <h1 class="font-bold text-sm">KitaFinance</h1>
          </div>
          <div class="flex items-center gap-2">
            <button onclick="toggleTheme()" class="w-9 h-9 bg-[var(--bg-body)] border border-[var(--border)] rounded-full flex items-center justify-center text-lg">
              <i class="ti ${state.theme==='dark'?'ti-sun text-amber-400':'ti-moon text-indigo-600'}"></i>
            </button>
            <button onclick="state.screen='auth'; render();" class="w-9 h-9 bg-rose-500/10 text-rose-500 rounded-full flex items-center justify-center text-lg"><i class="ti ti-logout"></i></button>
          </div>
        </header>

        <main class="w-full px-4 pt-4 flex-1">
          ${renderTabContent(saldo, totalIn, totalOut)}
        </main>

        <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto h-16 bg-[var(--bg-card)] border-t border-[var(--border)] flex justify-around items-center z-50 px-2 shadow-2xl">
          <button onclick="state.activeTab='dashboard'; render()" class="flex flex-col items-center justify-center text-xs font-semibold ${state.activeTab==='dashboard'?'text-indigo-500':'text-gray-400'}"><i class="ti ti-smart-home text-xl mb-0.5"></i>Beranda</button>
          <button onclick="state.activeTab='riwayat'; render()" class="flex flex-col items-center justify-center text-xs font-semibold ${state.activeTab==='riwayat'?'text-indigo-500':'text-gray-400'}"><i class="ti ti-receipt text-xl mb-0.5"></i>Riwayat</button>
          <button onclick="state.activeTab='budgeting'; render()" class="flex flex-col items-center justify-center text-xs font-semibold ${state.activeTab==='budgeting'?'text-indigo-500':'text-gray-400'}"><i class="ti ti-chart-donut text-xl mb-0.5"></i>Budget</button>
          <button onclick="state.activeTab='tabungan'; render()" class="flex flex-col items-center justify-center text-xs font-semibold ${state.activeTab==='tabungan'?'text-indigo-500':'text-gray-400'}"><i class="ti ti-pig-money text-xl mb-0.5"></i>Tabungan</button>
        </nav>
      `;
    }

    function renderTabContent(saldo, totalIn, totalOut) {
      // TAB 1: DASHBOARD
      if(state.activeTab === 'dashboard') {
        return `
          <div class="bg-gradient-to-br from-indigo-900 to-slate-900 border border-indigo-500/20 rounded-3xl p-5 text-white shadow-md mb-4">
            <span class="text-xs font-medium opacity-70">Sisa Saldo Bersama</span>
            <h2 class="text-2xl font-extrabold my-1">${formatIDR(saldo)}</h2>
            <div class="grid grid-cols-2 gap-4 mt-4 pt-3 border-t border-white/10">
              <div><span class="text-[10px] uppercase opacity-50 block">Pemasukan</span><span class="text-emerald-400 text-sm font-bold">+ ${formatIDR(totalIn)}</span></div>
              <div><span class="text-[10px] uppercase opacity-50 block">Pengeluaran</span><span class="text-rose-400 text-sm font-bold">- ${formatIDR(totalOut)}</span></div>
            </div>
          </div>
          <div class="flex items-center justify-between mb-2 mt-4"><h3 class="text-sm font-bold opacity-80"><i class="ti ti-history text-indigo-500"></i> Aktivitas Paling Baru</h3></div>
          <div class="bg-[var(--bg-card)] border border-[var(--border)] rounded-2xl divide-y divide-[var(--border)] px-3">
            ${state.transactions.slice(0,3).map(t => `
              <div class="py-3 flex justify-between items-center text-xs">
                <div><h4 class="font-bold">${t.desc}</h4><span class="text-[10px] text-gray-400">${t.category} • Oleh ${t.user}</span></div>
                <span class="font-bold ${t.type==='income'?'text-emerald-500':'text-rose-500'}">${t.type==='income'?'+':'-'} ${formatIDR(t.amount)}</span>
              </div>
            `).join('')}
          </div>
        `;
      }

      // TAB 2: RIWAYAT PEMASUKAN VS PENGELUARAN (MEMILIKI SUB-TAB FILTER)
      if(state.activeTab === 'riwayat') {
        const isExp = state.subRiwayatTab === 'expense';
        const listData = state.transactions.filter(t => isExp ? t.type==='expense' : t.type==='income');
        
        return `
          <div class="w-full flex bg-[var(--bg-card)] border border-[var(--border)] p-1 rounded-xl mb-4">
            <button onclick="state.subRiwayatTab='expense'; render()" class="flex-1 py-2 text-xs font-bold rounded-lg ${isExp?'bg-indigo-600 text-white shadow':'text-gray-400'}">📉 Pengeluaran</button>
            <button onclick="state.subRiwayatTab='income'; render()" class="flex-1 py-2 text-xs font-bold rounded-lg ${!isExp?'bg-indigo-600 text-white shadow':'text-gray-400'}">📈 Pemasukan</button>
          </div>

          <div class="bg-[var(--bg-card)] border border-[var(--border)] rounded-2xl divide-y divide-[var(--border)] px-3 mb-4 max-h-60 overflow-y-auto">
            ${listData.length === 0 ? '<p class="text-center py-6 text-xs text-gray-500">Belum ada data</p>' : listData.map(t => `
              <div class="py-3 flex justify-between items-center text-xs">
                <div><h4 class="font-bold">${t.desc}</h4><span class="text-[10px] text-gray-400">${t.category}</span></div>
                <div class="flex items-center gap-3">
                  <span class="font-bold ${isExp?'text-rose-500':'text-emerald-500'}">${formatIDR(t.amount)}</span>
                  <button onclick="openEdit('${t.id}')" class="text-blue-400 text-sm"><i class="ti ti-edit"></i></button>
                  <button onclick="deleteTx('${t.id}')" class="text-rose-500 text-sm"><i class="ti ti-trash"></i></button>
                </div>
              </div>
            `).join('')}
          </div>

          <div class="bg-[var(--bg-card)] border border-[var(--border)] rounded-2xl p-4">
            <h3 class="text-xs font-bold uppercase text-indigo-400 mb-3">${state.editingTxId ? '⚙️ Edit Data Transaksi' : '✍️ Catat Transaksi Baru'}</h3>
            <form onsubmit="saveTransaction(event)" class="space-y-3 text-xs">
              <input type="hidden" id="form-id">
              <div class="grid grid-cols-2 gap-2">
                <div><label class="block text-gray-400 mb-1">Kas Arus</label>
                  <select id="form-type" class="w-full bg-[var(--bg-body)] border border-[var(--border)] rounded-lg p-2.5 text-xs"><option value="expense">Pengeluaran (-)</option><option value="income">Pemasukan (+)</option></select>
                </div>
                <div><label class="block text-gray-400 mb-1">Kategori</label>
                  <select id="form-cat" class="w-full bg-[var(--bg-body)] border border-[var(--border)] rounded-lg p-2.5 text-xs"><option value="Makan & Kopi">Makan & Kopi</option><option value="Bahan Baku">Bahan Baku</option><option value="Operasional">Operasional</option><option value="Transport">Transport</option><option value="Omset">Omset Penjualan</option></select>
                </div>
              </div>
              <div><label class="block text-gray-400 mb-1">Keterangan</label><input type="text" id="form-desc" required placeholder="Contoh: Kulakan Kemasan Cup R&R" class="w-full bg-[var(--bg-body)] border border-[var(--border)] rounded-lg p-2.5"></div>
              <div><label class="block text-gray-400 mb-1">Nominal (Rupiah)</label><input type="number" id="form-amount" required placeholder="0" class="w-full bg-[var(--bg-body)] border border-[var(--border)] rounded-lg p-2.5"></div>
              <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-2.5 rounded-lg">Simpan Pencatatan</button>
            </form>
          </div>
        `;
      }

      // TAB 3: BUDGETING CONFIG
      if(state.activeTab === 'budgeting') {
        return `
          <h3 class="text-sm font-bold mb-3"><i class="ti ti-chart-bubble text-purple-500"></i> Alokasi Limit Pengeluaran</h3>
          <div class="bg-[var(--bg-card)] border border-[var(--border)] rounded-2xl p-4 space-y-4">
            ${state.budgets.map(b => {
              const spent = state.transactions.filter(t => t.category === b.category && t.type==='expense').reduce((a,b)=>a+b.amount, 0);
              const pct = Math.min(100, Math.round((spent/b.limit)*100)) || 0;
              return `
                <div class="text-xs">
                  <div class="flex justify-between font-bold mb-1"><span>${b.category}</span><span class="text-gray-400">${formatIDR(spent)} / ${formatIDR(b.limit)}</span></div>
                  <div class="w-full bg-[var(--bg-body)] h-2 rounded-full overflow-hidden border border-[var(--border)]"><div class="h-full bg-purple-500" style="width: ${pct}%"></div></div>
                </div>`;
            }).join('')}
          </div>
        `;
      }

      // TAB 4: TABUNGAN / POS SINKING FUND CONFIG
      if(state.activeTab === 'tabungan') {
        return `
          <h3 class="text-sm font-bold mb-3"><i class="ti ti-target text-emerald-500"></i> Target Sinking Fund Tim</h3>
          <div class="bg-[var(--bg-card)] border border-[var(--border)] rounded-2xl p-4 space-y-4">
            ${state.savingGoals.map(g => {
              const pct = Math.min(100, Math.round((g.current/g.target)*100)) || 0;
              return `
                <div class="text-xs">
                  <div class="flex justify-between font-bold mb-1"><span>${g.name}</span><span class="text-gray-400">${formatIDR(g.current)} / ${formatIDR(g.target)}</span></div>
                  <div class="w-full bg-[var(--bg-body)] h-2 rounded-full overflow-hidden border border-[var(--border)]"><div class="h-full bg-emerald-500" style="width: ${pct}%"></div></div>
                </div>`;
            }).join('')}
          </div>
        `;
      }
    }

    render();
  </script>
</body>
</html>
